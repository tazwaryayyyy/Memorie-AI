# cbindgen configuration — generates include/memoire.h from src/ffi.rs
# Activate by uncommenting the cbindgen block in build.rs and adding
# cbindgen = "0.26" to [build-dependencies] in Cargo.toml.
#
# Usage:
#   cargo install cbindgen
#   cbindgen --config cbindgen.toml --crate memoire --output include/memoire.h

language   = "C"
header     = "/* Auto-generated by cbindgen — do not edit manually. */"
include_guard = "MEMOIRE_H"
cpp_compat = true
tab_width  = 2

[export]
# Only export symbols that start with memoire_
prefix = "memoire_"
include = [
  "memoire_new",
  "memoire_free",
  "memoire_remember",
  "memoire_recall",
  "memoire_forget",
  "memoire_count",
  "memoire_clear",
  "memoire_free_string",
]

[parse]
parse_deps = false

[fn]
# Add doc comments above each function
must_use   = true
prefix     = ""
postfix    = ""

[documentation]
style = "c99"
