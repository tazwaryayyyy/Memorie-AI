name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: debug

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: fastembed-all-minilm-l6-v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (debug)
        run: cargo build --all-targets

      - name: Build (release)
        run: cargo build --release

      - name: Unit tests
        run: cargo test --lib

      - name: Integration tests
        run: cargo test --test integration_test

      - name: Doc tests
        run: cargo test --doc

  build-library:
    name: Build shared library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Verify shared library exists
        run: |
          ls -lh target/release/libmemoire.so
          file target/release/libmemoire.so
      - name: Check exported symbols
        run: |
          nm -D target/release/libmemoire.so | grep memoire_
